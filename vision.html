<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Vision Board</title>
<link rel="stylesheet" href="vision.css">
</head>

<body>

<div class="container">

<h1>Daily Vision Board</h1>

<button id="addCardBtn">Add Vision Card</button>

<div id="board" class="board"></div>

</div>


<!-- Add/Edit Modal -->
<div id="modal" class="modal hidden">

<div class="modal-content">

<h2>Add Vision Card</h2>

<input id="titleInput" placeholder="Title">

<textarea id="descInput" placeholder="Description"></textarea>

<input id="imageInput" placeholder="Image URL">

<button id="saveCard">Save</button>
<button id="closeModal">Cancel</button>

</div>

</div>


<script src="vision.js"></script>

</body>
</html>
