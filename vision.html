<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Vision Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Daily Vision Board</h1>
    <button id="backBtn">← Back to Private Room</button>
  </header>

  <main class="cards-container" id="visionBoard">

    <div class="card" data-title="Outfit of the Day">
      <h3>Outfit of the Day</h3>
      <div class="placeholder">Upload an image</div>
      <input type="file" accept="image/*" class="hidden-input">
      <img src="" alt="" class="card-img" style="display:none;">
    </div>

    <div class="card" data-title="Hobby of the Day">
      <h3>Hobby of the Day</h3>
      <div class="placeholder">Upload an image</div>
      <input type="file" accept="image/*" class="hidden-input">
      <img src="" alt="" class="card-img" style="display:none;">
    </div>

    <div class="card" data-title="Task of the Day">
      <h3>Task of the Day</h3>
      <div class="placeholder">Upload an image</div>
      <input type="file" accept="image/*" class="hidden-input">
      <img src="" alt="" class="card-img" style="display:none;">
    </div>

    <div class="card" data-title="Workout of the Day">
      <h3>Workout of the Day</h3>
      <div class="placeholder">Upload an image</div>
      <input type="file" accept="image/*" class="hidden-input">
      <img src="" alt="" class="card-img" style="display:none;">
    </div>

    <div class="card" data-title="Meal of the Day">
      <h3>Meal of the Day</h3>
      <div class="placeholder">Upload an image</div>
      <input type="file" accept="image/*" class="hidden-input">
      <img src="" alt="" class="card-img" style="display:none;">
    </div>

    <div class="card" data-title="Priority of the Day">
      <h3>Priority of the Day</h3>
      <div class="placeholder">Upload an image</div>
      <input type="file" accept="image/*" class="hidden-input">
      <img src="" alt="" class="card-img" style="display:none;">
    </div>

    <div class="card" data-title="Mindset of the Day">
      <h3>Mindset of the Day</h3>
      <div class="placeholder">Upload an image</div>
      <input type="file" accept="image/*" class="hidden-input">
      <img src="" alt="" class="card-img" style="display:none;">
    </div>

  </main>

  <script>
    const backBtn = document.getElementById('backBtn');
    backBtn.addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
      const input = card.querySelector('.hidden-input');
      const img = card.querySelector('.card-img');
      const placeholder = card.querySelector('.placeholder');

      card.addEventListener('click', () => {
        input.click();
      });

      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          img.src = reader.result;
          img.style.display = 'block';
          placeholder.style.display = 'none';
        };
        reader.readAsDataURL(file);
      });
    });
  </script>

</body>
</html>
