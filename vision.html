<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Vision Board</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="vision-title">Daily Vision Board</h1>

<div class="vision-board">

<div class="vision-card">
<h3>Meal of the Day</h3>
<img id="mealPreview" src="placeholder.jpg">
<input type="file" accept="image/*" data-preview="mealPreview">
</div>

<div class="vision-card">
<h3>Output of the Day</h3>
<img id="outputPreview" src="placeholder.jpg">
<input type="file" accept="image/*" data-preview="outputPreview">
</div>

<div class="vision-card">
<h3>Task of the Day</h3>
<img id="taskPreview" src="placeholder.jpg">
<input type="file" accept="image/*" data-preview="taskPreview">
</div>

<div class="vision-card">
<h3>Work of the Day</h3>
<img id="workPreview" src="placeholder.jpg">
<input type="file" accept="image/*" data-preview="workPreview">
</div>

<div class="vision-card">
<h3>Hobby of the Day</h3>
<img id="hobbyPreview" src="placeholder.jpg">
<input type="file" accept="image/*" data-preview="hobbyPreview">
</div>

<div class="vision-card">
<h3>Priority of the Day</h3>
<img id="priorityPreview" src="placeholder.jpg">
<input type="file" accept="image/*" data-preview="priorityPreview">
</div>

<div class="vision-card">
<h3>Mindset of the Day</h3>
<img id="mindsetPreview" src="placeholder.jpg">
<input type="file" accept="image/*" data-preview="mindsetPreview">
</div>

</div>

<script src="vision.js"></script>

</body>
</html>
