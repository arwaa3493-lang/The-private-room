<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Vision Board</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="vision-header">
<h1>Daily Vision Board</h1>
</header>

<main class="vision-board">

<div class="vision-card">
<h3>Meal of the Day</h3>
<img src="images/meal.jpg" alt="Meal">
</div>

<div class="vision-card">
<h3>Output of the Day</h3>
<img src="images/output.jpg" alt="Output">
</div>

<div class="vision-card">
<h3>Task of the Day</h3>
<img src="images/task.jpg" alt="Task">
</div>

<div class="vision-card">
<h3>Work of the Day</h3>
<img src="images/work.jpg" alt="Work">
</div>

<div class="vision-card">
<h3>Hobby of the Day</h3>
<img src="images/hobby.jpg" alt="Hobby">
</div>

<div class="vision-card">
<h3>Priority of the Day</h3>
<img src="images/priority.jpg" alt="Priority">
</div>

<div class="vision-card">
<h3>Mindset of the Day</h3>
<img src="images/mindset.jpg" alt="Mindset">
</div>

</main>

</body>
</html>
