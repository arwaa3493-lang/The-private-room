<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Focus Room</title>

<link rel="stylesheet" href="focus.css">

</head>

<body>

<div class="topbar">
<h1>Focus Room</h1>
<br>


<button class="focus-btn" onclick="location.href='index.html'">Back to Private Room</button>


<section class="focus-container">

<div class="session-creator">

<input id="sessionName" placeholder="Name a focus session (Study, Reading, Coding...)">

<button id="addSession">Add Session</button>

</div>


<div id="sessionGrid" class="session-grid"></div>


<div class="timer-section">

<h2 id="timerTitle">Focus Timer</h2>

<div id="timer">25:00</div>

<button id="startTimer">Start</button>
<button id="resetTimer">Reset</button>

</div>


<h2 class="tracker-title">Weekly Consistency</h2>

<div id="trackerGrid" class="tracker-grid"></div>

</section>


<script src="focus.js"></script>

</body>
</html>
