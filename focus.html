<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Room</title>
<link rel="stylesheet" href="timer.css">
</head>

<body>

<div class="focus-container">

<h1 class="title">Focus Room</h1>

<button onclick="location.href='index.html'" class="back-btn">
Back to Private Room
</button>

<div class="add-session-area">
<input id="sessionInput" type="text" placeholder="Name a focus session">
<button id="addSessionBtn">Add Session</button>
</div>

<div id="focusRoom" class="sessions-grid">
<!-- Sessions will appear here -->
</div>

<div class="timer-area">

<h2>Focus Timer</h2>

<div id="timer">25:00</div>

<div class="timer-buttons">
  <button id="startBtn">Start</button>
  <button id="resetBtn">Reset</button>
</div>

</div>

<script src="focus.js"></script>

</body>
</html>
