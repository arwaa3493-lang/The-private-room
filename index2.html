<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Daily Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="private-room">

    <h1>Visual Daily Board</h1>

    <button onclick="window.location.href='index.html'" class="secondary-btn">
      Back to Private Room
    </button>

    <section id="visualBoard">

      <div class="card">
        <h3>Outfit of the Day</h3>
        <img id="outfitImg">
        <input type="file" id="outfitUpload" accept="image/*">
        <textarea placeholder="Optional note..."></textarea>
      </div>

      <div class="card">
        <h3>Hobby of the Day</h3>
        <img id="hobbyImg">
        <input type="file" id="hobbyUpload" accept="image/*">
        <textarea placeholder="Optional note..."></textarea>
      </div>

      <div class="card">
        <h3>Task of the Day</h3>
        <img id="taskImg">
        <input type="file" id="taskUpload" accept="image/*">
        <textarea placeholder="Optional note..."></textarea>
      </div>

      <div class="card">
        <h3>Workout of the Day</h3>
        <img id="workoutImg">
        <input type="file" id="workoutUpload" accept="image/*">
        <textarea placeholder="Optional note..."></textarea>
      </div>

      <div class="card">
        <h3>Meal of the Day</h3>
        <img id="mealImg">
        <input type="file" id="mealUpload" accept="image/*">
        <textarea placeholder="Optional note..."></textarea>
      </div>

      <div class="card">
        <h3>Priority of the Day</h3>
        <img id="priorityImg">
        <input type="file" id="priorityUpload" accept="image/*">
        <textarea placeholder="Optional note..."></textarea>
      </div>

    </section>

  </main>

  <script src="vision.js"></script>
</body>
</html>
