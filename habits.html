<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Ritual</title>
  <link rel="stylesheet" href="habits.css">
</head>
<body>

<main class="habit-wrapper">

  <h1>Habit Ritual</h1>

  <button onclick="window.location.href='index.html'" class="secondary-btn">
    Back to Private Room
  </button>

  <!-- CALENDAR -->
  <div class="calendar-box">
    <div id="currentDate"></div>
  </div>

  <!-- TO DO LIST -->
  <div class="todo-box">
    <h2 id="todoHeader"></h2>
    <div class="add-todo">
      <input type="text" id="todoInput" placeholder="Add task...">
      <button id="addTodoBtn">Add</button>
    </div>
    <ul id="todoList"></ul>
  </div>

  <!-- HABITS -->
  <div class="add-habit">
    <input type="text" id="newHabitInput" placeholder="Add a new habit...">
    <button id="addHabitBtn">Add</button>
  </div>

  <div class="habit-container" id="habitContainer"></div>

</main>

<script src="habits.js"></script>
</body>
</html>
