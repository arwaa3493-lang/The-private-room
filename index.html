<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Private Room</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <!-- ENTRY -->
  <section id="entry">
    <h1>The Private Room</h1>
    <p class="prompt">What are you avoiding today?</p>

    <input type="text" id="avoidanceInput" placeholder="Say it quietly.">
    <button id="enterRoomBtn">Enter</button>

    <button id="visualBtn" class="secondary-btn">
      Enter Visual Day
    </button>
  </section>

  <!-- FOCUS ROOM -->
  <section id="focusRoom" class="hidden">
    <h1>Stay</h1>
    <div id="timer">25:00</div>
    <p id="whisperText">You don’t need motivation. You need presence.</p>
    <button id="endSessionBtn">Leave Quietly</button>
  </section>

  <!-- VISUAL BOARD -->
  <section id="visualBoard" class="hidden">

    <div class="card">
      <h3>Outfit of the Day</h3>
      <img id="outfitImg">
      <input type="file" id="outfitUpload" accept="image/*">
    </div>

    <div class="card">
      <h3>Hobby of the Day</h3>
      <img id="hobbyImg">
      <input type="file" id="hobbyUpload" accept="image/*">
    </div>

    <div class="card">
      <h3>Task of the Day</h3>
      <img id="taskImg">
      <input type="file" id="taskUpload" accept="image/*">
    </div>

    <div class="card">
      <h3>Workout of the Day</h3>
      <img id="workoutImg">
      <input type="file" id="workoutUpload" accept="image/*">
    </div>

    <div class="card">
      <h3>Meal of the Day</h3>
      <img id="mealImg">
      <input type="file" id="mealUpload" accept="image/*">
    </div>

    <div class="card">
      <h3>Priority of the Day</h3>
      <img id="priorityImg">
      <input type="file" id="priorityUpload" accept="image/*">
    </div>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>
