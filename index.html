<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Private Room</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="private-room">

    <!-- ENTRY SECTION -->
    <section class="entry" id="entry">
      <h1>The Private Room</h1>
      <p class="prompt">What are you avoiding today?</p>

      <input
        type="text"
        id="avoidanceInput"
        placeholder="Say it quietly. No one else will see this."
        autocomplete="off"
      />

      <button id="enterRoomBtn">Enter</button>

      <button onclick="window.location.href='vision.html'">
        Enter Visual Day
      </button>

      <button onclick="window.location.href='habits.html'">
        Enter Habit Ritual
      </button>

      <p class="footer-note">This space responds to honesty.</p>
    </section>

    <!-- FOCUS ROOM -->
    <section class="focus-room hidden" id="focusRoom">
      <h1>Stay</h1>
      <div class="timer" id="timer">25:00</div>
      <p class="whisper" id="whisperText">
        You don’t need motivation. You need presence.
      </p>
      <button id="endSessionBtn">Leave Quietly</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
