<!-- Floating Action Button -->
<button class="fab" id="focusBtn" title="Focus Mode">
  <i class="fa-solid fa-moon"></i>
</button>

<!-- Focus Overlay -->
<div class="focus-mode" id="focusOverlay">
  <h2 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 1rem;">Deep Work</h2>
  <div class="focus-timer">25:00</div>
  <button class="action-btn" style="width: 50px; height: 50px; font-size: 1.5rem;" onclick="document.getElementById('focusOverlay').classList.remove('active')">
    <i class="fa-solid fa-xmark"></i>
  </button>
</div>

<!-- The Masonry Board -->
<div id="visualBoard">
  
  <!-- Card 1 -->
  <div class="card" draggable="true">
    <div class="card-actions">
      <button class="action-btn"><i class="fa-solid fa-pen"></i></button>
      <button class="action-btn"><i class="fa-solid fa-trash"></i></button>
    </div>
    <div class="card-img-wrapper">
      <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=500" alt="Office">
    </div>
    <div class="card-body">
      <h3>Productivity</h3>
      <p>Organize workspace for maximum efficiency.</p>
      <div class="tags">
        <span class="tag active">Work</span>
        <span class="tag">Goal</span>
      </div>
    </div>
    <input type="file" style="display:none">
  </div>

        <span class="tag">Health</span>

  </div>
